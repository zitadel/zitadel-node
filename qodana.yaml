version: '1.0'

profile:
  name: qodana.recommended

exclude:
  - name: All
    paths:
      - src/api
      - src/models
      # Test code legitimately uses fixture classes, descriptive names and
      # reaches into internals; production-grade IDE inspections are noise here.
      - test
      - spec
  # The repo's own ESLint check is the authority for lint/code-style concerns
  # and it already passes in CI. Stop Qodana from double-reporting the same
  # lint-domain inspections so it surfaces only genuine non-lint issues.
  - name: Eslint
  - name: ES6PreferShortImport
  - name: ES6UnusedImports
  - name: JSUnusedLocalSymbols
  - name: JSValidateJSDoc
  - name: JSCommentMatchesSignature
  - name: JSDuplicatedDeclaration
  - name: UnnecessaryContinueJS
  - name: UnnecessaryLocalVariableJS
  - name: ExceptionCaughtLocallyJS
  # The bespoke authenticators intentionally use oauth4webapi's
  # `allowInsecureRequests` (deprecated upstream but still functional) to permit
  # http:// issuers for local development and the integration test harness. The
  # replacement (custom fetch) would be a behaviour-risky rewrite for a
  # deliberate, guarded use, so the deprecation notice is scoped to src/auth.
  - name: JSDeprecatedSymbols
    paths:
      - src/auth
  # Cross-file structural duplication is inherent to generated/transport code.
  - name: DuplicatedCode
  # Code coverage is not a metric we gate on, and the bulk of the SDK is
  # generated code that is untested by design. Qodana does not support
  # path-scoped coverage exclusion (only full-inspection / .NET attribute
  # excludes), so the coverage inspection is disabled outright.
  - name: JsCoverageInspection

bootstrap: npm ci --no-progress

linter: jetbrains/qodana-js:2026.1
